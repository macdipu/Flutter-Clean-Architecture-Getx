name: customer
description: 'A new Flutter project.'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI / Design
  cupertino_icons: ^1.0.9
  flutter_svg: ^2.3.0
  any_image_view: ^2.1.0
  pinput: ^6.0.2
  skeletonizer: ^2.1.3
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1

  # State Management
  get: ^4.7.3
  flutter_hooks: ^0.21.3+1

  # Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Logging / Utilities
  logger: ^2.7.0
  dartz: ^0.10.1
  equatable: ^2.0.8
  intl: ^0.20.2

  # Networking
  internet_connection_checker_plus: ^2.9.1+2
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0

  # Auth / Security
  smart_auth: ^3.2.0
  local_auth: ^3.0.1

  # Media / Files
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  gal: ^2.3.2
  mobile_scanner: ^7.2.0
  cached_network_image: ^3.4.1

  # Weather Pulse - Charts / Animations / Fonts
  fl_chart: ^0.69.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Weather Pulse - Home screen widgets, notifications, background
  home_widget: ^0.7.0
  workmanager: ^0.6.0
  timezone: ^0.11.0
  flutter_timezone: ^4.1.0

  # Notifications / Firebase
  flutter_local_notifications: ^21.0.0
  firebase_core: ^4.8.0
  firebase_messaging: ^16.2.1

  # Platform / Device
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  share_plus: ^13.1.0
  permission_handler: ^12.0.2
  geolocator: ^14.0.2
  device_info_plus: ^13.1.0
  package_info_plus: ^9.0.0
  app_version_update: ^6.2.0
  font_awesome_flutter: ^11.0.0
  image_cropper: ^12.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting / Tooling
  flutter_lints: ^6.0.0

  # App Branding / Assets
  rename_app: ^1.6.6
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/svgs/

flutter_native_splash:
  color: "#ffffff"
  android: true
  ios: true

dependency_overrides:
  # file_picker is patched locally (packages/file_picker) to stub the Windows
  # implementation so it compiles against win32 ^6.x alongside all other plugins.
#  file_picker: ^11.0.2
  file_picker:
    path: packages/file_picker
  win32: ^6.3.0
  package_info_plus: 10.1.0
  meta: ^1.18.0



#dart run flutter_launcher_icons
#flutter pub run flutter_native_splash:create
#rename setAppName --targets ios,android,web,macos,windows,linux --value "Onkur Customer"
#rename setBundleId --targets ios,android,macos,linux,windows --value "com.onkur.customer"
#find lib -type f -name "*.dart" -exec sed -i '' 's/package:com.onkur.customer\//package:customer\//g' {} +
