version: '3.8'
services:
  flutter:
    privileged: true
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    environment:
      - ADB_LIBUSB=1

# Note: This override is intended for Linux hosts where /dev/bus/usb can be passed into
# the flutter container to allow direct access to USB-attached Android devices. On macOS
# and Windows Docker Desktop, USB passthrough is not supported this way.
