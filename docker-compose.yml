services:
  flutter:
    build:
      context: .
      dockerfile: docker/flutter/Dockerfile
    volumes:
      - .:/home/developer/app:cached
      - flutter_pub_cache:/home/developer/.pub-cache
      - gradle_cache:/home/developer/.gradle
      - android_sdk:/opt/android-sdk
    environment:
      - ANDROID_SDK_ROOT=/opt/android-sdk
      - CI=true
    networks:
      - android-net
    ports:
      - 8081:8081 # Flutter debug port (if using web or host-forwarding)
    tty: true
    stdin_open: true

  emulator:
    build:
      context: .
      dockerfile: docker/emulator/Dockerfile
    container_name: flutter-emulator
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    volumes:
      - .:/home/developer/app:cached
      - emulator_home:/home/developer/.android:cached
      - android_sdk:/opt/android-sdk
    environment:
      - ANDROID_SDK_ROOT=/opt/android-sdk
      # Set ANDROID_EMULATOR_NAME to the AVD name you want to start (mount pre-created AVDs into emulator_home)
      - ANDROID_EMULATOR_NAME=android_emulator
      # Auto-create the AVD if missing by installing a system image (first run will download a large image)
      - ANDROID_SYSTEM_IMAGE=system-images;android-33;google_apis;x86_64
      - ANDROID_EMULATOR_RAM=4096
      - ANDROID_DEVICE=pixel
      - CI=true
    networks:
      - android-net
    ports:
      - 5555:5555   # adb/tcp (useful to adb connect from host)
      - 8082:8080   # ws-scrcpy / web UI
    tty: true
    stdin_open: true
    healthcheck:
      test: ["CMD-SHELL", "/opt/android-sdk/platform-tools/adb devices | grep -q 'device$' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  flutter_pub_cache:
  gradle_cache:
  emulator_home:
  android_sdk:

networks:
  android-net:
    driver: bridge

  scrcpy-web:
    image: shmayro/scrcpy-web:latest
    container_name: scrcpy-web
    restart: unless-stopped
    privileged: true
    ports:
      - "8000:8000"
    depends_on:
      emulator:
        condition: service_healthy
    command: >
      sh -c "\
        /opt/android-sdk/platform-tools/adb connect flutter-emulator:5555 && \
        npm start\
      "
    volumes:
      - ./extras:/extras:ro
