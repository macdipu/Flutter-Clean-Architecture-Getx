version: "3.8"

services:
  android:
    image: mingc/android-build-box:latest
    container_name: android-emulator
    privileged: true
    tty: true
    volumes:
      - .:/workspace
      - android-sdk:/root/.android
    ports:
      - "5037:5037" # adb server
      - "5555:5555" # emulator tcp
    command: ["/bin/sh","-c","sleep infinity"]
    restart: unless-stopped

  flutter:
    image: mingc/android-build-box:latest
    container_name: flutter-dev
    tty: true
    volumes:
      - .:/workspace
      - android-sdk:/root/.android
    working_dir: /workspace
    depends_on:
      - android
    command: ["/bin/sh","-c","tail -f /dev/null"]
    restart: unless-stopped

  scrcpy-web:
    image: "${SCRCPY_WEB_IMAGE:-shmayro/scrcpy-web:latest}"
    container_name: scrcpy-web
    depends_on:
      - android
    ports:
      - "${SCRCPY_WEB_PORT:-8080}:${SCRCPY_WEB_PORT:-8080}"
    environment:
      - ADB_SERVER=android:5037
    command: ["/bin/sh","-c","/start.sh || sleep infinity"]
    restart: unless-stopped

volumes:
  android-sdk:
    name: android_sdk
